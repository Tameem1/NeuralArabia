<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <title>Tawjeeh AI | Guiding AI Inside the Business</title>
    <meta
      name="description"
      content="Tawjeeh AI helps organizations guide AI inside the business through structured products, practical solutions, focused research, and useful resources."
    />
    <meta
      property="og:title"
      content="Tawjeeh AI | Guiding AI Inside the Business"
    />
    <meta property="og:description" content="A bilingual landing page for Tawjeeh AI focused on guiding AI inside the business across products, solutions, research, and resources." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      (() => {
        const storedLanguage = localStorage.getItem("tawjeeh-language");
        const language =
          storedLanguage === "ar" || (!storedLanguage && navigator.language.toLowerCase().startsWith("ar")) ? "ar" : "en";

        document.documentElement.lang = language;
        document.documentElement.dir = language === "ar" ? "rtl" : "ltr";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script
      type="text/javascript"
      src="https://replit.com/public/js/replit-dev-banner.js"
    ></script>
  </body>
</html>
